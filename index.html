<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Peças da Mamãe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        .pink-gradient { background: linear-gradient(135deg, #f472b6 0%, #db2777 100%); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-pink-50 text-slate-800 pb-12">
    <div id="app">
        <!-- Tela Inicial de Configuração (Visível se as chaves estiverem vazias) -->
        <div class="min-h-screen flex items-center justify-center p-6 text-center">
            <div class="flex flex-col items-center max-w-sm">
                <div class="w-20 h-20 bg-white rounded-full shadow-lg flex items-center justify-center mb-6 text-pink-500 animate-pulse">
                    <i data-lucide="cloud-off" size="40"></i>
                </div>
                <h2 class="text-2xl font-black text-pink-600 mb-2">Quase Pronto!</h2>
                <p class="text-slate-500 text-sm mb-8 leading-relaxed">
                    Siga o guia no chat para pegar as chaves do Google e colar no código. Isso garante que os dados <b>nunca sumam</b>.
                </p>
                
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-2 border-pink-100 text-left w-full">
                    <p class="text-pink-500 font-black text-xs uppercase tracking-widest mb-4 italic text-center">Aguardando chaves do Firebase...</p>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 text-[11px] text-slate-500">
                            <div class="w-5 h-5 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold">1</div>
                            <span>Crie o projeto no Firebase Console</span>
                        </div>
                        <div class="flex items-center gap-3 text-[11px] text-slate-500">
                            <div class="w-5 h-5 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold">2</div>
                            <span>Ative Firestore e Auth Anônimo</span>
                        </div>
                        <div class="flex items-center gap-3 text-[11px] text-slate-500">
                            <div class="w-5 h-5 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold">3</div>
                            <span>Cole as chaves em "manualConfig"</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================================================================
        // 🔑 PASSO FINAL: COLE SEUS DADOS DO FIREBASE AQUI:
        // ================================================================
        const manualConfig = {
		apiKey: "AIzaSyATIvwb1wNtbG7wMdGasFuEcXEdWhkqlJk",
  		authDomain: "controle-estoque-de62b.firebaseapp.com",
  		projectId: "controle-estoque-de62b",
  		storageBucket: "controle-estoque-de62b.firebasestorage.app",
  		messagingSenderId: "547002141613",
  		appId: "1:547002141613:web:3293b7bdb688abc91f2f24",
  		measurementId: "G-79HLF27G15"
        };
        // ================================================================

        function getFirebaseConfig() {
            try {
                const envConfig = window['__firebase_config'] || (typeof __firebase_config !== 'undefined' ? __firebase_config : null);
                if (envConfig) return typeof envConfig === 'string' ? JSON.parse(envConfig) : envConfig;
            } catch (e) {}
            return (manualConfig && manualConfig.apiKey) ? manualConfig : null;
        }

        const config = getFirebaseConfig();

        if (config) {
            initFirebase(config);
        } else {
            lucide.createIcons();
        }

        async function initFirebase(config) {
            try {
                const app = initializeApp(config);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const appId = window['__app_id'] || (typeof __app_id !== 'undefined' ? __app_id : 'controle-pecas-mae');

                const startAuth = async () => {
                    const token = window['__initial_auth_token'] || (typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null);
                    if (token) await signInWithCustomToken(auth, token);
                    else await signInAnonymously(auth);
                };

                onAuthStateChanged(auth, (user) => {
                    if (user) startSync(db, appId);
                });

                await startAuth();
            } catch (err) {
                console.error("Erro ao iniciar:", err);
            }
        }

        function startSync(db, appId) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'movimentacoes');
            onSnapshot(colRef, (snapshot) => {
                const transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(transactions, db, appId);
            }, (error) => {
                console.error("Erro de permissão:", error);
                alert("Erro: Certifique-se de que ativou o Firestore em 'Modo de Teste' e o Auth Anônimo no console do Firebase.");
            });
        }

        function render(transactions, db, appId) {
            const sorted = [...transactions].sort((a, b) => new Date(b.data) - new Date(a.data) || b.timestamp - a.timestamp);
            const total = sorted.reduce((acc, t) => acc + t.valor, 0);
            
            const mesesMap = sorted.reduce((acc, t) => {
                const m = (t.data || "").substring(0, 7);
                if (!m) return acc;
                if (!acc[m]) acc[m] = { t: 0, e: 0, s: 0 };
                acc[m].t += t.valor;
                if (t.valor > 0) acc[m].e += t.valor; else acc[m].s += Math.abs(t.valor);
                return acc;
            }, {});
            const listaMeses = Object.keys(mesesMap).sort().reverse();

            window.handleAdd = async (tipo) => {
                const qtdElement = document.getElementById('qtd');
                const obsElement = document.getElementById('obs');
                const dataElement = document.getElementById('data');
                const qtd = Number(qtdElement.value);
                if (!qtd || qtd <= 0) return;

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'movimentacoes'), {
                    data: dataElement.value,
                    descricao: obsElement.value || (tipo === 'entrada' ? 'Produção' : 'Venda'),
                    valor: tipo === 'entrada' ? qtd : -qtd,
                    timestamp: Date.now()
                });
                qtdElement.value = '';
                obsElement.value = '';
            };

            window.deleteItem = async (id) => {
                if (confirm("Apagar este registro para sempre?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'movimentacoes', id));
                }
            };

            window.toggleExtras = () => document.getElementById('extras').classList.toggle('hidden');

            document.getElementById('app').innerHTML = `
                <div class="pink-gradient rounded-b-[3.5rem] p-10 shadow-xl mb-6 text-center text-white relative overflow-hidden animate-in">
                    <h1 class="text-lg font-bold opacity-80 mb-6 flex items-center justify-center gap-2 italic">
                         Controle de Peças da Mamãe 🌸
                    </h1>
                    <span class="text-[10px] font-black uppercase tracking-[0.3em] opacity-60">Total em Stock</span>
                    <div class="text-7xl font-black mt-2 leading-none drop-shadow-md">${total}</div>
                </div>

                <div class="max-w-md mx-auto px-5 space-y-6 animate-in">
                    <div class="bg-white p-7 rounded-[2.5rem] shadow-lg border border-pink-100">
                        <div class="space-y-5">
                            <input type="number" id="qtd" inputmode="numeric" placeholder="0" class="w-full text-5xl font-black p-6 bg-pink-50/50 border-2 border-pink-100 rounded-3xl text-center outline-none focus:border-pink-400 text-pink-600 placeholder:text-pink-100 transition-all">
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="handleAdd('entrada')" class="bg-emerald-500 text-white p-6 rounded-3xl font-black shadow-lg flex flex-col items-center gap-2 active:scale-95 transition-transform"><i data-lucide="plus-circle" size="28"></i> FIZ PEÇAS</button>
                                <button onclick="handleAdd('saida')" class="bg-rose-500 text-white p-6 rounded-3xl font-black shadow-lg flex flex-col items-center gap-2 active:scale-95 transition-transform"><i data-lucide="shopping-cart" size="28"></i> VENDI</button>
                            </div>
                            <button onclick="toggleExtras()" class="w-full text-[10px] font-black text-pink-200 uppercase tracking-widest">Mudar Data / Detalhes</button>
                            <div id="extras" class="hidden space-y-4 pt-4 border-t border-pink-50">
                                <input type="date" id="data" value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                                <input type="text" id="obs" placeholder="Ex: Encomenda Maria" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-md overflow-hidden border border-pink-100">
                        <div class="p-5 bg-pink-50/30 border-b font-black text-[10px] text-pink-300 tracking-widest uppercase">Resumo Mensal</div>
                        <div class="divide-y divide-pink-50">
                            ${listaMeses.map(m => `
                                <div class="p-6 flex justify-between items-center">
                                    <div>
                                        <p class="font-black text-slate-700 capitalize text-lg leading-none mb-1">${new Date(m + '-02').toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</p>
                                        <p class="text-[9px] font-black text-pink-300 uppercase tracking-tighter">Fiz: ${mesesMap[m].e} | Vendi: ${mesesMap[m].s}</p>
                                    </div>
                                    <div class="text-2xl font-black ${mesesMap[m].t >= 0 ? 'text-emerald-500' : 'text-pink-500'}">${mesesMap[m].t > 0 ? '+' : ''}${mesesMap[m].t}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] shadow-md overflow-hidden border border-pink-100">
                        <div class="p-5 bg-pink-50/30 border-b font-black text-[10px] text-pink-300 tracking-widest uppercase">Histórico Recente</div>
                        <div class="max-h-80 overflow-y-auto divide-y divide-pink-50">
                            ${sorted.map(t => `
                                <div class="p-5 flex items-center justify-between group transition-colors hover:bg-pink-50/10">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${t.valor >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-pink-50 text-pink-600'}"><i data-lucide="${t.valor >= 0 ? 'plus' : 'minus'}" size="20"></i></div>
                                        <div>
                                            <p class="font-bold text-slate-700 text-sm leading-tight">${t.descricao}</p>
                                            <p class="text-[10px] text-slate-400">${new Date(t.data + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="font-black text-lg ${t.valor >= 0 ? 'text-emerald-600' : 'text-pink-600'}">${t.valor > 0 ? '+' : ''}${t.valor}</span>
                                        <button onclick="deleteItem('${t.id}')" class="p-2 text-pink-100 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" size="16"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex flex-col items-center gap-2 py-6">
                        <div class="flex items-center gap-2 px-5 py-2 bg-emerald-50 text-emerald-500 rounded-full text-[9px] font-black uppercase tracking-[0.2em]">
                            <i data-lucide="shield-check" size="14"></i> Dados Eternos na Nuvem Google
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }
    </script>
</body>
</html>
