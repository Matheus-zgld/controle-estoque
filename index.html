<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Peças da Mamãe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        
        .pink-gradient {
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-pink-50 text-slate-800 pb-12">
    <div id="app">
        <!-- Tela de Carregamento -->
        <div class="min-h-screen flex items-center justify-center p-6 text-center">
            <div class="flex flex-col items-center">
                <div class="animate-spin text-pink-500 mb-4">
                    <i data-lucide="loader-2" size="48"></i>
                </div>
                <p class="text-pink-600 font-bold text-lg">Abrindo o caderninho...</p>
                <p id="status-msg" class="text-pink-300 text-xs mt-2 font-medium">Verificando segurança...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"; import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"; import { getFirestore,
        collection, doc, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"; // Configuração automática do ambiente const firebaseConfig = JSON.parse(__firebase_config); const appId
        = typeof __app_id !== 'undefined' ? __app_id : 'controle-pecas-mae'; const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); let transactions = []; let userAuth = null; // REGRA 3: Autenticação ANTES
        de qualquer operação const startApp = async () => { const statusMsg = document.getElementById('status-msg'); try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token);
        } else { await signInAnonymously(auth); } } catch (err) { console.error("Erro Auth:", err); if(statusMsg) statusMsg.innerText = "Erro ao conectar. Recarregue a página."; } }; onAuthStateChanged(auth, (user) => { if (user) { userAuth = user; //
        REGRA 1: Caminho obrigatório /artifacts/{appId}/public/data/{collection} const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'movimentacoes'); // Escutar mudanças no banco (Cloud) onSnapshot(colRef, (snapshot) => { transactions
        = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); render(); }, (error) => { console.error("Erro Firestore:", error); alert("Erro de permissão no banco de dados. Contate o suporte."); }); } }); startApp(); // Ações Globais window.handleAdd
        = async (tipo) => { const qtdInput = document.getElementById('qtd'); const obsInput = document.getElementById('obs'); const dataInput = document.getElementById('data'); const qtd = Number(qtdInput.value); if (!qtd || qtd
        <=0 || !userAuth)
            return; const label=o bsInput.value || (tipo==='entrada' ? 'Produção Própria' : 'Venda Realizada'); try { const colRef=c ollection(db, 'artifacts', appId, 'public', 'data', 'movimentacoes'); await addDoc(colRef, { data: dataInput.value, descricao:
            label, valor: tipo==='entrada' ? qtd : -qtd, timestamp: Date.now() // Usado para ordenação manual }); qtdInput.value='' ; obsInput.value='' ; } catch (e) { alert( "Erro ao salvar na nuvem. Verifique sua internet."); } }; window.deleteItem=a sync
            (id)=> { if (!confirm("Deseja mesmo apagar este registro?")) return; try { const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'movimentacoes', id); await deleteDoc(docRef); } catch (e) { alert("Erro ao apagar registro."); } }; window.toggleExtras
            = () => document.getElementById('extras').classList.toggle('hidden'); function render() { // Ordenação manual (Regra 2: Evitar índices complexos) const sortedItems = [...transactions].sort((a, b) => { const dA = new Date(a.data).getTime();
            const dB = new Date(b.data).getTime(); if (dB !== dA) return dB - dA; return (b.timestamp || 0) - (a.timestamp || 0); }); const total = sortedItems.reduce((acc, t) => acc + t.valor, 0); const meses = sortedItems.reduce((acc, t) => { const
            m = t.data.substring(0, 7); if (!acc[m]) acc[m] = { t: 0, e: 0, s: 0 }; acc[m].t += t.valor; if (t.valor > 0) acc[m].e += t.valor; else acc[m].s += Math.abs(t.valor); return acc; }, {}); const sortedMonths = Object.keys(meses).sort().reverse();
            document.getElementById('app').innerHTML = `
            <div class="pink-gradient rounded-b-[3.5rem] p-10 shadow-xl mb-6 text-center text-white relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10 rotate-12">
                    <i data-lucide="flower-2" size="120"></i>
                </div>
                <h1 class="text-lg font-bold opacity-90 mb-6 flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" size="18"></i> Meu Estoque 🌸
                </h1>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] opacity-60">Peças Prontas Agora</span>
                <div class="text-7xl font-black mt-2 leading-none drop-shadow-md">${total}</div>
            </div>

            <div class="max-w-md mx-auto px-5 space-y-6">
                <!-- Painel de Lançamento -->
                <div class="bg-white p-7 rounded-[2.5rem] shadow-lg border border-pink-100">
                    <div class="space-y-5">
                        <div>
                            <label class="text-[10px] font-black text-pink-300 ml-1 uppercase mb-2 block tracking-widest">Quantas Peças?</label>
                            <input type="number" id="qtd" inputmode="numeric" placeholder="0" class="w-full text-5xl font-black p-6 bg-pink-50/50 border-2 border-pink-100 rounded-3xl text-center outline-none focus:border-pink-400 transition-all text-pink-600 placeholder:text-pink-100">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="handleAdd('entrada')" class="bg-emerald-500 text-white p-6 rounded-3xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-all flex flex-col items-center gap-2">
                                    <i data-lucide="plus-circle" size="28"></i> 
                                    <span class="text-xs">FIZ PEÇAS</span>
                                </button>
                            <button onclick="handleAdd('saida')" class="bg-rose-500 text-white p-6 rounded-3xl font-black shadow-lg shadow-rose-100 active:scale-95 transition-all flex flex-col items-center gap-2">
                                    <i data-lucide="shopping-cart" size="28"></i>
                                    <span class="text-xs">VENDI</span>
                                </button>
                        </div>

                        <button onclick="toggleExtras()" class="w-full py-2 text-[10px] font-black text-pink-200 hover:text-pink-400 uppercase tracking-[0.2em] transition-colors">Opções de Data / Nome</button>

                        <div id="extras" class="hidden space-y-4 pt-4 border-t border-pink-50 animate-in fade-in duration-300">
                            <div>
                                <label class="text-[9px] font-black text-slate-300 uppercase ml-1">Data</label>
                                <input type="date" id="data" value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-slate-600">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-300 uppercase ml-1">O que foi? (Opcional)</label>
                                <input type="text" id="obs" placeholder="Ex: Encomenda da Maria" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-slate-600">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Resumo por Mês -->
                <div class="bg-white rounded-[2.5rem] shadow-md overflow-hidden border border-pink-100">
                    <div class="p-5 bg-pink-50/30 border-b border-pink-50 font-black text-[10px] text-pink-300 tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="calendar-range" size="14"></i> Resumo Mensal
                    </div>
                    <div class="divide-y divide-pink-50">
                        ${sortedMonths.map(m => { const [ano, mes] = m.split('-'); const nomeMes = new Date(ano, mes - 1).toLocaleDateString('pt-BR', { month: 'long' }); const s = meses[m]; return `
                        <div class="p-6 flex justify-between items-center hover:bg-pink-50/20 transition-colors">
                            <div>
                                <p class="font-black text-slate-700 capitalize text-lg leading-none mb-1">${nomeMes}</p>
                                <div class="flex gap-3 text-[9px] font-black uppercase tracking-tighter">
                                    <span class="text-emerald-500">Entrou: ${s.e}</span>
                                    <span class="text-pink-500">Saiu: ${s.s}</span>
                                </div>
                            </div>
                            <div class="text-2xl font-black ${s.t >= 0 ? 'text-emerald-500' : 'text-pink-500'}">
                                ${s.t > 0 ? '+' : ''}${s.t}
                            </div>
                        </div>
                        `; }).join('')} ${sortedMonths.length === 0 ? '
                        <p class="p-10 text-center text-pink-200 text-xs italic">Nada registrado ainda.</p>' : ''}
                    </div>
                </div>

                <!-- Histórico -->
                <div class="bg-white rounded-[2.5rem] shadow-md overflow-hidden border border-pink-100">
                    <div class="p-5 bg-pink-50/30 border-b border-pink-50 font-black text-[10px] text-pink-300 tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="history" size="14"></i> Últimos Registros
                    </div>
                    <div class="max-h-80 overflow-y-auto divide-y divide-pink-50">
                        ${sortedItems.map(t => `
                        <div class="p-5 flex items-center justify-between group transition-colors hover:bg-pink-50/10">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${t.valor >= 0 ? 'bg-emerald-50 text-emerald-500' : 'bg-pink-50 text-pink-500'}">
                                    <i data-lucide="${t.valor >= 0 ? 'arrow-up-right' : 'arrow-down-right'}" size="20"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-700 text-sm leading-tight">${t.descricao}</p>
                                    <p class="text-[10px] text-slate-400 font-medium">${new Date(t.data + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-lg ${t.valor >= 0 ? 'text-emerald-600' : 'text-pink-600'}">
                                            ${t.valor > 0 ? '+' : ''}${t.valor}
                                        </span>
                                <button onclick="deleteItem('${t.id}')" class="p-2 text-pink-100 hover:text-rose-500 transition-colors">
                                            <i data-lucide="trash-2" size="16"></i>
                                        </button>
                            </div>
                        </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Status de Segurança -->
                <div class="flex flex-col items-center gap-2 py-4">
                    <div class="flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-500 rounded-full text-[9px] font-black uppercase tracking-[0.2em]">
                        <i data-lucide="shield-check" size="14"></i> Dados protegidos na Nuvem
                    </div>
                    <p class="text-[8px] text-pink-200 uppercase font-bold tracking-widest">Nunca perde os dados mesmo limpando histórico</p>
                </div>
            </div>
            `; lucide.createIcons(); }
    </script>
</body>

</html>
