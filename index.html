<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Peças</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-sky-50 text-slate-800 pb-12">
    <div id="app">
        <!-- Tela de Carregamento Inicial -->
        <div class="min-h-screen flex items-center justify-center p-6 text-center">
            <div id="loading-screen">
                <div class="inline-block animate-bounce mb-4 text-sky-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                </div>
                <p id="status-main" class="text-sky-600 font-bold text-lg">Abrindo o caderninho...</p>
                <p id="status-sub" class="text-xs text-slate-400 mt-2 italic">Preparando conexão segura...</p>

                <!-- Aviso para o Vercel -->
                <div id="setup-notice" class="hidden mt-8 p-4 bg-white rounded-2xl border border-amber-200 shadow-sm text-left max-w-xs mx-auto">
                    <p class="text-amber-600 font-bold text-sm mb-1">Atenção (Modo Vercel):</p>
                    <p class="text-slate-500 text-[10px] leading-relaxed">
                        Para este site funcionar fora do editor, você precisa colocar suas próprias chaves do Firebase no código (variável <code>firebaseConfig</code>).
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"; import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"; import { getFirestore,
        collection, doc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"; const statusMain = document.getElementById('status-main'); const statusSub = document.getElementById('status-sub'); const
        setupNotice = document.getElementById('setup-notice'); // --- CONFIGURAÇÃO DO FIREBASE --- let firebaseConfig; try { // Tenta usar a config do ambiente automático firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config
        : '{}'); } catch (e) { firebaseConfig = {}; } // Se estiver no Vercel e não tiver config, avisa o usuário if (!firebaseConfig.apiKey) { statusMain.innerText = "Configuração Necessária"; statusSub.innerText = "O site precisa das chaves do Firebase
        para funcionar."; setupNotice.classList.remove('hidden'); // Nota para o desenvolvedor: Se você está lendo isso, substitua {} pelo seu objeto de config do Firebase aqui se for hospedar por conta própria. // firebaseConfig = { apiKey: "...", ...
        }; } const appId = typeof __app_id !== 'undefined' ? __app_id : 'controle-pecas-mae'; let app, auth, db, currentUser; let transactions = []; // Inicialização Protegida if (firebaseConfig.apiKey) { try { app = initializeApp(firebaseConfig); auth
        = getAuth(app); db = getFirestore(app); // Autenticação primeiro (REGRA 3) const start = async () => { try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); }
        else { await signInAnonymously(auth); } } catch (err) { console.error("Erro Auth:", err); statusSub.innerText = "Erro ao validar sua entrada."; } }; onAuthStateChanged(auth, (user) => { if (user) { currentUser = user; statusSub.innerText = "Buscando
        suas peças..."; listenToDatabase(); } }); start(); } catch (err) { console.error("Erro Init:", err); statusMain.innerText = "Erro de Conexão"; } } function listenToDatabase() { // Caminho fixo obrigatório (REGRA 1) const colRef = collection(db,
        'artifacts', appId, 'public', 'data', 'movimentacoes'); onSnapshot(colRef, (snapshot) => { transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => { const dateA = new Date(a.data).getTime(); const dateB = new Date(b.data).getTime();
        if (dateB !== dateA) return dateB - dateA; return (b.timestamp || 0) - (a.timestamp || 0); }); renderApp(); }, (error) => { console.error("Erro Firestore:", error); statusMain.innerText = "Acesso Negado"; statusSub.innerText = "Verifique as regras
        de permissão do seu Firebase."; }); } // Funções de Interface window.handleAdd = async (tipo) => { const qtdInput = document.getElementById('qtd'); const obsInput = document.getElementById('obs'); const dataInput = document.getElementById('data');
        const qtd = Number(qtdInput.value); if (!qtd || qtd
        <=0 || !currentUser) return; const valorFinal=t ipo==='entrada' ? qtd : -qtd; const label=o bsInput.value || (tipo==='entrada' ? 'Produção Própria' : 'Venda Realizada'); try { const colRef=c ollection(db, 'artifacts', appId, 'public', 'data',
            'movimentacoes'); await addDoc(colRef, { data: dataInput.value, descricao: label, valor: valorFinal, timestamp: Date.now() }); qtdInput.value='' ; obsInput.value='' ; // O render acontece automático via onSnapshot } catch (e) { alert(
            "Erro ao salvar! Tente novamente."); } }; window.deleteItem=a sync (id)=> { const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'movimentacoes', id); await deleteDoc(docRef); }; window.toggleExtras = () => document.getElementById('extras').classList.toggle('hidden'); function renderApp() { const total = transactions.reduce((acc,
            t) => acc + t.valor, 0); const meses = transactions.reduce((acc, t) => { const m = t.data.substring(0, 7); if (!acc[m]) acc[m] = { t: 0, ent: 0, sai: 0 }; acc[m].t += t.valor; if (t.valor > 0) acc[m].ent += t.valor; else acc[m].sai += Math.abs(t.valor);
            return acc; }, {}); const sortedMeses = Object.keys(meses).sort().reverse(); const appDiv = document.getElementById('app'); appDiv.innerHTML = `
            <div class="bg-white rounded-b-[3rem] shadow-sm p-8 mb-6 border-b border-sky-100">
                <div class="max-w-md mx-auto text-center">
                    <h1 class="text-2xl font-black text-sky-700 italic flex items-center justify-center gap-2">
                        Meu Controle de Peças 🌸
                    </h1>
                    <div class="mt-8 bg-gradient-to-br from-sky-500 to-indigo-600 rounded-3xl p-8 shadow-xl shadow-sky-200">
                        <span class="text-sky-100 text-xs font-bold uppercase tracking-widest">Estoque Hoje</span>
                        <div class="text-6xl font-black text-white mt-2 leading-none">${total}</div>
                        <p class="text-sky-200 text-sm mt-3 font-medium">peças prontas</p>
                    </div>
                </div>
            </div>

            <div class="max-w-md mx-auto px-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-lg border border-sky-50">
                    <div class="space-y-5">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 ml-1 uppercase mb-1 block tracking-wider">Quantidade</label>
                            <input type="number" id="qtd" inputmode="numeric" placeholder="Ex: 5" class="w-full text-3xl font-bold p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center outline-none focus:border-sky-400 transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="handleAdd('entrada')" class="bg-emerald-500 text-white p-5 rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-transform flex flex-col items-center gap-2 uppercase text-sm">
                                    <i data-lucide="trending-up"></i>Fiz Peças
                                </button>
                            <button onclick="handleAdd('saida')" class="bg-rose-500 text-white p-5 rounded-2xl font-black shadow-lg shadow-rose-100 active:scale-95 transition-transform flex flex-col items-center gap-2 uppercase text-sm">
                                    <i data-lucide="trending-down"></i>Vendi
                                </button>
                        </div>
                        <button onclick="toggleExtras()" class="w-full py-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Opções Extras</button>
                        <div id="extras" class="hidden space-y-4 pt-4 border-t border-slate-100">
                            <input type="date" id="data" value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 bg-slate-50 border rounded-xl font-medium">
                            <input type="text" id="obs" placeholder="Ex: Encomenda Maria" class="w-full p-4 bg-slate-50 border rounded-xl font-medium">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-lg border border-sky-50 overflow-hidden">
                    <div class="p-4 bg-slate-50/50 border-b font-black text-[10px] text-slate-400 tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="calendar" size="14"></i> Resumo Mensal
                    </div>
                    <div class="divide-y divide-slate-50">
                        ${sortedMeses.map(m => { const [ano, mesNum] = m.split('-'); const nomeMes = new Date(ano, mesNum - 1).toLocaleDateString('pt-BR', { month: 'long' }); return `
                        <div class="p-5 flex justify-between items-center hover:bg-sky-50/30 transition-colors">
                            <div>
                                <p class="font-bold text-slate-800 capitalize leading-none">${nomeMes} <span class="text-slate-300 font-normal">${ano}</span></p>
                                <div class="mt-2 flex gap-3 text-[10px] font-bold uppercase tracking-tight">
                                    <span class="text-emerald-500">Fiz: ${meses[m].ent}</span>
                                    <span class="text-rose-500">Vendi: ${meses[m].sai}</span>
                                </div>
                            </div>
                            <div class="text-2xl font-black ${meses[m].t >= 0 ? 'text-emerald-500' : 'text-rose-600'}">
                                ${meses[m].t > 0 ? '+' : ''}${meses[m].t}
                            </div>
                        </div>
                        `; }).join('')}
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-lg border border-sky-50 overflow-hidden">
                    <div class="p-4 bg-slate-50/50 border-b font-black text-[10px] text-slate-400 tracking-widest uppercase flex items-center gap-2">
                        <i data-lucide="history" size="14"></i> Histórico
                    </div>
                    <div class="max-h-72 overflow-y-auto divide-y divide-slate-50">
                        ${transactions.map(t => `
                        <div class="p-4 flex items-center justify-between group transition-colors hover:bg-slate-50">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${t.valor >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                                    <i data-lucide="${t.valor >= 0 ? 'plus' : 'minus'}" size="18"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-700 leading-tight text-sm">${t.descricao}</p>
                                    <p class="text-[10px] text-slate-400 font-medium">${new Date(t.data + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-lg ${t.valor >= 0 ? 'text-emerald-500' : 'text-rose-500'}">
                                            ${t.valor > 0 ? '+' : ''}${t.valor}
                                        </span>
                                <button onclick="deleteItem('${t.id}')" class="p-2 text-slate-200 hover:text-rose-400 transition-colors">
                                            <i data-lucide="trash-2" size="16"></i>
                                        </button>
                            </div>
                        </div>
                        `).join('')}
                    </div>
                </div>

                <div class="flex flex-col items-center gap-2 pb-6">
                    <div class="flex items-center gap-2 text-emerald-600/30 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-[0.2em]">
                        <i data-lucide="cloud" size="12"></i> Sincronizado na Nuvem
                    </div>
                </div>
            </div>
            `; lucide.createIcons(); }
    </script>
</body>

</html>
